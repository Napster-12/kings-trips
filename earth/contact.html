<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | KingSTrips</title>

<!-- Bootstrap & Fonts -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1e2e3e; line-height: 1.6; margin: 0; padding: 0; }
.navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); box-shadow: 0 6px 20px rgba(0,0,0,0.05); padding: 1.2rem 0; }
.navbar-brand img { height: 85px; }
.nav-link { font-weight: 500; margin-left: 1.5rem; color: #1e3e55 !important; }
.nav-link.active { color: #1e5d8e !important; }
.page-hero { background: linear-gradient(rgba(10,30,45,0.75), rgba(10,30,45,0.75)), url('images/contact-bg.jpg') center/cover; height: 40vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
.page-hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; }
.page-hero p { font-size: 1.2rem; }
.section { padding: 90px 0; }
.section-title { font-weight: 700; font-size: 2.4rem; margin-bottom: 40px; text-align: center; color: #1d3d5a; }
.contact-box { background: #f6fafd; color: #1e2e3e; border-radius: 30px; padding: 4rem 3rem; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
.form-control { border-radius: 14px; padding: 14px; border: 1px solid #ced4da; }
.form-control:focus { box-shadow: none; border: 1px solid #1e5d8e; }
.btn-main { background: #1e5d8e; border: none; padding: 14px 32px; border-radius: 50px; font-weight: 600; color: white; }
.btn-main:hover { background: #17496d; }
#status { font-weight: 600; color: #1e5d8e; }
.social-icons { margin-bottom: 30px; }
.social-icons a { color: #1e5d8e; margin: 0 12px; font-size: 28px; transition: 0.3s; }
.social-icons a:hover { color: #17496d; }
.footer { background: #eef3f8; padding: 25px 0; text-align: center; color: #2b4c6b; border-top: 1px solid #d8e2ed; }
@media(max-width:768px){ .navbar-brand img { height: 65px; } .page-hero h1 { font-size: 2rem; } }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><img src="images/logo.jpg" alt="KingSTrips Logo"></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="Trips.html">Trips</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="page-hero">
  <div class="container">
    <h1>Contact KingSTrips</h1>
    <p>Plan your next unforgettable journey</p>
  </div>
</section>

<!-- Contact Section -->
<section class="section">
  <div class="container">
    <div class="contact-box">

      <!-- Other Contact Options -->
      <h2 class="section-title mb-4">Other Ways to Contact Us</h2>
      <div class="text-center social-icons">
        <a href="tel:0647625369" title="Call Us"><i class="fas fa-phone"></i></a>
        <a href="https://wa.me/27647625369" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@kingstrips" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/share/1DiEDpWb55/" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/kingstrips" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
      </div>

      <!-- Contact Form -->
      <h2 class="section-title mb-4">Travel Enquiry Form</h2>

      <form id="contact-form" class="row g-3">

        <div class="col-md-6">
          <input type="text" id="name" name="user_name" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="col-md-6">
          <input type="email" id="email" name="user_email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="col-md-6">
          <input type="text" id="phone" name="phone" class="form-control" placeholder="Phone Number" required>
        </div>
        <div class="col-md-6">
          <input type="text" id="subject" name="subject" class="form-control" placeholder="Subject" required>
        </div>
        <div class="col-md-6">
          <input type="text" id="destination" name="destination" class="form-control" placeholder="Destination">
        </div>
        <div class="col-md-6">
          <input type="date" id="travel_date" name="travel_date" class="form-control">
        </div>
        <div class="col-md-6">
          <input type="number" id="travellers" name="travellers" class="form-control" placeholder="Number of Travellers">
        </div>
        <div class="col-md-6">
          <input type="text" id="budget" name="budget" class="form-control" placeholder="Budget Range">
        </div>
        <div class="col-12">
          <textarea id="message" name="message" class="form-control" rows="5" placeholder="Additional Message" required></textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-main mt-3">Send Enquiry</button>
        </div>
        <div class="col-12 mt-3">
          <p id="status"></p>
        </div>

      </form>

    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <p>© 2026 KingSTrips (Pty) Ltd | All Rights Reserved</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("oQjDe5_7OqFqfYGwb"); // Replace with your Public Key

document.getElementById("contact-form").addEventListener("submit", function(e){
  e.preventDefault();

  const templateParams = {
    user_name: document.getElementById("name").value,
    user_email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    subject: document.getElementById("subject").value,
    destination: document.getElementById("destination").value,
    travel_date: document.getElementById("travel_date").value,
    travellers: document.getElementById("travellers").value,
    budget: document.getElementById("budget").value,
    message: document.getElementById("message").value,
    submission_date: new Date().toLocaleString()
  };

  console.log(templateParams); // Debug: check values

  emailjs.send("service_7a4q88s", "template_1d33ezn", templateParams)
    .then(() => {
      document.getElementById("status").innerHTML = "✅ Enquiry sent successfully!";
      document.getElementById("contact-form").reset();
    }, (error) => {
      document.getElementById("status").innerHTML = "❌ Failed to send. Please try again.";
      console.error(error);
    });
});
</script>

</body>
</html>
