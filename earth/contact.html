<!DOCTYPE html>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .navbar-brand img {
      height: 50px;
    }
    .contact-section {
      padding: 60px 20px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-top: 30px;
    }
    .contact-section h2 {
      margin-bottom: 30px;
      font-weight: bold;
      color: #333;
    }
    .social-icons a {
      margin: 0 15px;
      font-size: 28px;
      color: #333;
      transition: 0.3s;
    }
    .social-icons a:hover {
      color: #0d6efd;
    }
    .contact-info p {

      margin: 10px 0;

<body>

<!-- CONTACT SECTION -->
<section id="contact" class="section">
  <div class="container">
    <div class="contact-section text-center">
      <h2>Contact Us</h2>

      <div class="contact-info">
        <p>Call: <a href="tel:0647625369">064 762 5369</a> | <a href="tel:0672987440">067 298 7440</a></p>
        <p>Email: <a href="mailto:mathebulathulani377@gmail.com">mathebulathulani377@gmail.com</a></p>
      </div>

      <!-- Social Media -->
      <div class="social-icons mt-4">
        <a href="https://wa.me/27647625369" target="_blank"><i class="fab fa-whatsapp"></i></a>

      <div class="mt-5">

          <div class="col-md-6">
            <input type="text" class="form-control" placeholder="Your Name" required>
          </div>
          <div class="col-md-6">
            <input type="email" class="form-control" placeholder="Your Email" required>
          </div>
          <div class="col-12">
            <input type="text" class="form-control" placeholder="Subject" required>
          </div>
          <div class="col-12">
            <textarea class="form-control" rows="5" placeholder="Message" required></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
